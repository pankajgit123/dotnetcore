name: build-and-deploy

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore src/ProductMvc/ProductMvc.csproj

      - name: Build
        run: dotnet build src/ProductMvc/ProductMvc.csproj --configuration Release --no-restore

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Deploy (publish)
        run: dotnet publish src/ProductMvc/ProductMvc.csproj --configuration Release --output publish/productmvc

      - name: Upload published app artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-publish
          path: publish
